<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(${profileUser.displayName} + ' 的元老档案')}"></head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<main class="container page">
    <section class="admin-hero profile-hero public-profile-hero">
        <div>
            <p class="eyebrow">Elder Archive</p>
            <h1 th:text="${profileUser.nickname} + ' · 元老公开档案'">元老公开档案</h1>
            <p class="muted">公开档案只显示论坛内身份、纯数字呼号、驻点、部门与职能专长；不会显示邮箱等现实联系方式。</p>
        </div>
        <div class="public-profile-actions">
            <a class="btn btn-primary" th:if="${currentUser != null and currentUser.id != profileUser.id}" th:href="@{/messages/{username}(username=${profileUser.username})}">发送私信</a>
            <a class="btn btn-ghost" th:if="${currentUser == null}" th:href="@{/login(next=${'/messages/' + profileUser.username})}">登入后私信</a>
            <a class="btn btn-ghost" th:href="@{/search(q=${profileUser.displayName})}">检索相关讨论</a>
        </div>
    </section>

    <section class="public-profile-layout">
        <aside class="profile-card public-profile-card">
            <img class="profile-avatar" th:if="${profileUser.customAvatar}" th:src="${profileUser.avatarUrl}" alt="avatar"><div class="profile-avatar profile-avatar-initial" th:unless="${profileUser.customAvatar}" th:text="${profileUser.avatarInitial}">元</div>
            <h2 th:text="${profileUser.nickname}">元老</h2>
            <p class="muted" th:text="|@${profileUser.username}|">@username</p>
            <div class="archive-code-panel">
                <span th:text="${profileUser.archiveDisplayLabel}">呼号</span>
                <strong th:text="${profileUser.archiveDisplayCode}">000000</strong>
            </div>
            <div class="profile-meta">
                <span>身份</span><strong th:text="${profileUser.roleLabel}">普通元老</strong>
                <span>议案</span><strong th:text="${profileUser.postCount}">0</strong>
                <span>回复</span><strong th:text="${profileUser.replyCount}">0</strong>
                <span>部署</span><strong th:text="${profileUser.deploymentType}">临高内驻元老</strong>
            </div>
        </aside>

        <section class="admin-card public-profile-detail">
            <div class="section-title-row">
                <div>
                    <p class="eyebrow">Basic Records</p>
                    <h2>基本信息</h2>
                </div>
                <span th:text="${profileUser.archiveDisplayCode}">000000</span>
            </div>
            <div class="profile-info-grid">
                <article><span>呼号</span><strong th:text="${#strings.isEmpty(profileUser.callSign) ? '未设置' : profileUser.callSign}">000000</strong></article>
                <article><span>电报号</span><strong th:text="${#strings.isEmpty(profileUser.telegramCode) ? '未设置' : profileUser.telegramCode}">T000000</strong></article>
                <article><span>所属部门 / 工作组</span><strong th:text="${profileUser.councilDepartment}">待分配</strong></article>
                <article><span>职能专长</span><strong th:text="${#strings.isEmpty(profileUser.specialty) ? '待补充' : profileUser.specialty}">待补充</strong></article>
                <article><span>驻点范围</span><strong th:text="${profileUser.stationScope}">STRATEGIC</strong></article>
                <article><span>驻点名称</span><strong th:text="${profileUser.stationName == null ? '未登记' : profileUser.stationName}">临高首都区 / 登陆点</strong></article>
                <article><span>同行元老</span><strong th:text="|${profileUser.stationElderCount} 人|">1 人</strong></article>
                <article><span>注册时间</span><strong th:text="${#temporals.format(profileUser.createdAt, 'yyyy-MM-dd HH:mm')}">时间</strong></article>
            </div>
            <div class="public-bio-card">
                <h3>档案简介</h3>
                <p th:text="${#strings.isEmpty(profileUser.bio) ? '该元老还没有填写公开简介。' : profileUser.bio}">简介</p>
            </div>
        </section>
    </section>
</main>
<div th:replace="~{fragments :: footer}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
